<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legal Affairs Request Management Platform</title>
  </head>
  <body>
    <!-- React will place the entire application inside this div. -->
    <div id="root"></div>

    <!-- Vite starts the React app from this JavaScript entry file. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!--
BEGINNER DOCUMENTATION:

1. What is HTML?
HTML means HyperText Markup Language. It gives structure to a webpage.

2. What is a tag?
A tag is something like <body>, <head>, or <div>. Tags tell the browser what kind of content is being shown.

3. What is the root div?
The <div id="root"></div> is an empty container. React uses JavaScript to fill this container with the app UI.

4. What does type="module" mean?
It tells the browser that the script uses modern JavaScript modules, such as import and export.
-->
